# Render Blueprint — https://render.com/docs/blueprint-spec
#
# On first apply, Render will:
# - Create Postgres `fjelllift-frankfurt` (EU) and inject DATABASE_URL into the web service
# - Generate AUTH_SECRET and CRON_SECRET
# - Prompt for Resend (HTTP email — Render blocks outbound SMTP on some plans; same pattern as fineli-ai)
#
# Public site URL: set AUTH_URL in the dashboard only if needed (e.g. custom domain).
# Otherwise the app uses Render’s RENDER_EXTERNAL_URL at runtime.

services:
  - type: web
    name: fjelllift
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    # Wait for GitHub Actions (see .github/workflows/ci.yml) before building — no deploy hook needed.
    autoDeployTrigger: checksPass
    # Build does not need DB access. Migrations run in preDeployCommand (DATABASE_URL is set there).
    buildCommand: npm ci && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: fjelllift-frankfurt
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      # Magic links: https://resend.com — HTTP API (no SMTP). See README.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Optional: MapTiler Outdoor basemap on /map (see README)
      - key: NEXT_PUBLIC_MAPTILER_API_KEY
        sync: false
    # Optional: Cron Job POST /api/cron/sync with Authorization: Bearer CRON_SECRET

databases:
  # Region is fixed when the instance is created. Renaming forces a new DB in Frankfurt if an
  # older blueprint omitted `region` and Render defaulted to Oregon.
  - name: fjelllift-frankfurt
    region: frankfurt
    databaseName: wind_sport
    user: wind
    plan: basic-256mb
