services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: wind
      POSTGRES_PASSWORD: wind
      POSTGRES_DB: wind_sport
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wind -d wind_sport"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
