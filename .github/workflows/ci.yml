# CI: lint, DB migrate, Vitest (with coverage), production build, Playwright E2E.
# Production deploy: Render `autoDeployTrigger: checksPass` in render.yaml — waits for this workflow.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://wind:wind@localhost:5432/wind_sport
  AUTH_SECRET: ci-auth-secret-must-be-at-least-32-chars-long
  AUTH_TRUST_HOST: "true"
  AUTH_URL: http://127.0.0.1:3000

jobs:
  test:
    name: Lint, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: wind
          POSTGRES_PASSWORD: wind
          POSTGRES_DB: wind_sport
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wind -d wind_sport"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: ESLint
        run: npm run lint

      - name: Knip (unused files / exports / dependencies)
        run: npm run audit:dead

      - name: Unit & functional tests (Vitest + coverage)
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
